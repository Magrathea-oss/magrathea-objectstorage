name: Magrathea CI

on:
  schedule:
    - cron: "17 3 * * 0"
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      run-native-docker:
        description: "Build the GraalVM native Docker image"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run-live-alert-delivery:
        description: "Validate live Prometheus and Alertmanager webhook delivery"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run-ep6-soak:
        description: "Run the opt-in 15-minute EP-6 soak validation"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run-ep8-full-supply-chain:
        description: "Build and validate complete EP-8 supply-chain evidence (never publishes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  canonical-quality-gate:
    name: Canonical root Maven and source freshness gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: |
            magrathea-ui/package-lock.json
            bootstrap-application/src/main/scripts/package-lock.json

      - name: Check generated Gherkin appendix
        run: python3 scripts/generate-gherkin-requirements-appendix.py --check

      - name: Check generated S3 API semantic coverage
        run: python3 scripts/generate-s3-api-coverage.py --check

      - name: Check source hygiene
        run: bash scripts/check-source-hygiene.sh

      - name: Validate GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7

      - name: Run complete root Maven test gate
        run: mvn -B --no-transfer-progress test

      - name: Check Git diff whitespace
        run: git diff --check

  ep8-application-supply-chain:
    name: EP-8 architecture and application supply-chain evidence
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate EP-8 architecture contract
        run: >-
          mvn -B --no-transfer-progress -pl s3-reactive-api-adapter -am
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest=PhaseEp8ArchitectureContractCucumberTest test

      - name: Generate application CycloneDX and license evidence
        run: bash scripts/generate-application-supply-chain.sh

      - name: Upload EP-8 application supply-chain evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ep8-application-supply-chain-${{ github.run_id }}
          path: |
            target/supply-chain/
            target/site/supply-chain/
            s3-reactive-api-adapter/target/cucumber-json/ep8-architecture-contract.json
            s3-reactive-api-adapter/target/surefire-reports/*PhaseEp8ArchitectureContract*.xml
            s3-reactive-api-adapter/target/surefire-reports/*PhaseEp8ArchitectureContract*.txt
          if-no-files-found: warn
          retention-days: 30

  ep8-full-supply-chain-scheduled-or-manual:
    name: EP-8 full image, runtime, OWASP, and evidence contract
    runs-on: ubuntu-latest
    needs: ep8-application-supply-chain
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run-ep8-full-supply-chain == 'true')
    steps:
      - name: Check out clean sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and validate full fail-closed supply-chain evidence
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          SUPPLY_CHAIN_SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -uo pipefail
          mkdir -p target
          set +e
          bash scripts/run-supply-chain-evidence.sh 2>&1 | tee target/ep8-supply-chain-evidence.log
          evidence_status=${PIPESTATUS[0]}
          mvn -B --no-transfer-progress -pl s3-reactive-api-adapter -am \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dtest=PhaseEp8SupplyChainEvidenceCucumberIT test
          contract_status=$?
          set -e
          if (( contract_status != 0 )); then
            echo "EP-8 supply-chain evidence contract failed with exit $contract_status" >&2
            exit "$contract_status"
          fi
          if (( evidence_status != 0 )); then
            echo "EP-8 producer or fail-closed OWASP gate failed with exit $evidence_status" >&2
            exit "$evidence_status"
          fi

      - name: Upload complete EP-8 supply-chain and error evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ep8-full-supply-chain-${{ github.run_id }}
          path: |
            target/ep8-supply-chain-evidence.log
            target/supply-chain/
            target/site/supply-chain/
            target/site/dependency-check-analysis.json
            target/dependency-check-report.json
            target/dependency-check-report.html
            target/dependency-check-scan.log
            target/dependency-check-scan-error.json
            s3-reactive-api-adapter/target/cucumber-json/ep8-supply-chain-evidence.json
            s3-reactive-api-adapter/target/surefire-reports/*PhaseEp8SupplyChainEvidenceCucumberIT*
          if-no-files-found: warn
          retention-days: 30

  ep7-browser-acceptance:
    name: EP-7 Playwright and axe acceptance (360/768/1440)
    runs-on: ubuntu-latest
    needs: canonical-quality-gate
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: magrathea-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: magrathea-ui
        run: npm ci

      - name: Validate frontend contracts, types, unit tests, template, build, and extension removal
        working-directory: magrathea-ui
        run: npm run validate

      - name: Install Playwright Chromium
        working-directory: magrathea-ui
        run: npx playwright install --with-deps chromium

      - name: Validate built Admin app in configured browser viewports
        working-directory: magrathea-ui
        run: npm run test:e2e:ci

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ep7-browser-diagnostics-${{ github.run_id }}
          path: |
            magrathea-ui/playwright-report/
            magrathea-ui/test-results/
          if-no-files-found: warn
          retention-days: 14

  focused-cucumber-supplementary:
    name: Focused fail-fast Cucumber gates (supplementary)
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run focused Cucumber and semantic gates
        run: |
          set -o pipefail
          mkdir -p target
          mvn -B --no-transfer-progress -pl s3-reactive-api-adapter -am -Dsurefire.failIfNoSpecifiedTests=false -Dtest=PhaseEp1SecurityIdentityRequirementsCucumberTest,PhaseEp1SecurityIdentityAwsCliCucumberTest,Ep1SecurityServicesSpecsCucumberTest,PhaseEp2MetadataDurabilityCucumberTest,PhaseEp2MetadataDurabilityFullRestartCucumberTest,Phase3ReactivePipelineStaticArchitectureSpecsCucumberTest,Phase3RuntimeBackpressureSpecsCucumberTest,PhaseEp4SpaceManagementSpecsCucumberTest,PhaseEp4CapacityWebCucumberTest,PhaseEp4CapacityAwsCliCucumberTest,PhaseEp5OperabilityRequirementsCucumberTest,PhaseEp5StorageMigrationSpecsCucumberTest,PhaseEp5DeliverySpecsCucumberTest,PhaseEp7AdminApiRequirementsCucumberTest,S3ApiSemanticCoverageReportSpecsCucumberTest,Phase5S3SemanticCompatibilityRequirementsCucumberTest,Phase5S3SemanticCompatibilityAwsCliCucumberTest,Phase5MultipartFullRestartCucumberTest test | tee target/focused-cucumber.log
          ! grep -q 'Using generated security password' target/focused-cucumber.log

  ep6-ci-load:
    name: EP-6 deterministic 45-second load validation
    runs-on: ubuntu-latest
    needs: canonical-quality-gate
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate EP-6 object, multipart, timeout, concurrency, and rate limits
        run: mvn -B --no-transfer-progress -Pep6-performance-capacity-tests -pl s3-reactive-api-adapter -am -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Validate EP-6 real TCP connection cap
        run: mvn -B --no-transfer-progress -Pep6-connection-cap-tests -pl s3-reactive-api-adapter -am -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Run EP-6 CI load profile
        run: mvn -B --no-transfer-progress -Pep6-ci -pl s3-reactive-api-adapter -am -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Upload EP-6 CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ep6-ci-${{ github.run_id }}
          path: s3-reactive-api-adapter/target/ep6/results/ci/
          if-no-files-found: error

  ep6-soak-scheduled-or-manual:
    name: EP-6 opt-in 15-minute soak validation
    runs-on: ubuntu-latest
    needs: canonical-quality-gate
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run-ep6-soak == 'true')
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run EP-6 soak profile
        run: mvn -B --no-transfer-progress -Pep6-soak -pl s3-reactive-api-adapter -am -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Upload EP-6 soak evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ep6-soak-${{ github.run_id }}
          path: s3-reactive-api-adapter/target/ep6/results/soak/
          if-no-files-found: error

  root-jvm-docker:
    name: Root JVM Docker image
    runs-on: ubuntu-latest
    needs: canonical-quality-gate
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate JVM replacement and immutable local publication
        run: |
          set -o pipefail
          mvn -B --no-transfer-progress -Pdocker-cucumber-tests -pl s3-reactive-api-adapter -am \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dtest=PhaseEp5JvmContainerReplacementRequirementsCucumberIT,PhaseEp5LocalReleasePublicationCucumberIT test \
            | tee req-ops-025-container-replacement.log
          ! grep -q 'Using generated security password' req-ops-025-container-replacement.log

  live-alert-delivery-manual:
    name: Live Prometheus and Alertmanager delivery (manual)
    runs-on: ubuntu-latest
    needs: canonical-quality-gate
    if: github.event_name == 'workflow_dispatch' && inputs.run-live-alert-delivery == 'true'
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run opt-in live alert delivery requirement
        run: |
          set -o pipefail
          mvn -B --no-transfer-progress -pl s3-reactive-api-adapter -am -Dsurefire.failIfNoSpecifiedTests=false -Dtest=PhaseEp5LiveAlertDeliveryRequirementsCucumberTest test | tee live-alert-delivery.log
          ! grep -q 'Using generated security password' live-alert-delivery.log
          ! grep -q 'LEAK: ByteBuf.release' live-alert-delivery.log

  native-docker-manual:
    name: Native Docker image (manual)
    runs-on: ubuntu-latest
    needs: canonical-quality-gate
    if: github.event_name == 'workflow_dispatch' && inputs.run-native-docker == 'true'
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Build and smoke native Docker image
        run: |
          set -o pipefail
          docker build --network=host -f Dockerfile.native -t magrathea-objectstorage:native . | tee docker-build-native.log
          ! grep -q 'Using generated security password' docker-build-native.log
          docker rm -f magrathea-native-smoke >/dev/null 2>&1 || true
          docker run -d --name magrathea-native-smoke --network=host magrathea-objectstorage:native
          trap 'docker logs magrathea-native-smoke > docker-smoke-native.log 2>&1 || true; docker rm -f magrathea-native-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8081/admin/health >/tmp/magrathea-native-admin-health.json; then
              break
            fi
            if ! docker ps --format '{{.Names}}' | grep -qx magrathea-native-smoke; then
              docker logs magrathea-native-smoke >&2 || true
              exit 1
            fi
            if [ "$attempt" = 60 ]; then
              docker logs magrathea-native-smoke >&2 || true
              exit 1
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8081/admin/live >/tmp/magrathea-native-admin-live.json
          curl -fsS http://127.0.0.1:8081/admin/ready >/tmp/magrathea-native-admin-ready.json
          grep -q '"status":"ready"' /tmp/magrathea-native-admin-ready.json
          curl -fsS -H 'Accept: application/xml' http://127.0.0.1:8080/ >/tmp/magrathea-native-listbuckets.xml
          docker run --rm --entrypoint sh magrathea-objectstorage:native -c '! command -v java && ! command -v javac'
          docker logs magrathea-native-smoke > docker-smoke-native.log 2>&1
          ! grep -q 'Using generated security password' docker-smoke-native.log
