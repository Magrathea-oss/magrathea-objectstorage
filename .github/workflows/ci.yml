name: Magrathea CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run-native-docker:
        description: "Build the GraalVM native Docker image"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  source-and-cucumber-gates:
    name: Source hygiene and focused Cucumber gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: |
            magrathea-ui/package-lock.json
            bootstrap-application/src/main/scripts/package-lock.json

      - name: Check generated Gherkin appendix
        run: python3 scripts/generate-gherkin-requirements-appendix.py --check

      - name: Check source hygiene
        run: bash scripts/check-source-hygiene.sh

      - name: Run focused Cucumber and semantic gates
        run: |
          set -o pipefail
          mkdir -p target
          mvn -B --no-transfer-progress -pl s3-reactive-api-adapter -am -Dsurefire.failIfNoSpecifiedTests=false -Dtest=PhaseEp1SecurityIdentityRequirementsCucumberTest,PhaseEp1SecurityIdentityAwsCliCucumberTest,Ep1SecurityServicesSpecsCucumberTest,PhaseEp2MetadataDurabilityCucumberTest,PhaseEp2MetadataDurabilityFullRestartCucumberTest,Phase3ReactivePipelineStaticArchitectureSpecsCucumberTest,Phase5S3SemanticCompatibilityRequirementsCucumberTest,Phase5S3SemanticCompatibilityAwsCliCucumberTest,Phase5MultipartFullRestartCucumberTest test | tee target/focused-cucumber.log
          ! grep -q 'Using generated security password' target/focused-cucumber.log

      - name: Check Git diff whitespace
        run: git diff --check

  root-jvm-docker:
    name: Root JVM Docker image
    runs-on: ubuntu-latest
    needs: source-and-cucumber-gates
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Build and smoke root JVM Docker image
        run: |
          set -o pipefail
          docker build --network=host -f Dockerfile -t magrathea-objectstorage:jvm . | tee docker-build-jvm.log
          ! grep -q 'Using generated security password' docker-build-jvm.log
          docker rm -f magrathea-jvm-smoke >/dev/null 2>&1 || true
          docker run -d --name magrathea-jvm-smoke --network=host magrathea-objectstorage:jvm
          trap 'docker logs magrathea-jvm-smoke > docker-smoke-jvm.log 2>&1 || true; docker rm -f magrathea-jvm-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8081/admin/health >/tmp/magrathea-admin-health.json; then
              break
            fi
            if ! docker ps --format '{{.Names}}' | grep -qx magrathea-jvm-smoke; then
              docker logs magrathea-jvm-smoke >&2 || true
              exit 1
            fi
            if [ "$attempt" = 60 ]; then
              docker logs magrathea-jvm-smoke >&2 || true
              exit 1
            fi
            sleep 1
          done
          curl -fsS -H 'Accept: application/xml' http://127.0.0.1:8080/ >/tmp/magrathea-listbuckets.xml
          curl -fsS -X PUT http://127.0.0.1:8080/ci-jvm-smoke-bucket >/tmp/magrathea-put-bucket.out
          printf 'ci-jvm-smoke-body' | curl -fsS -X PUT --data-binary @- http://127.0.0.1:8080/ci-jvm-smoke-bucket/object.txt >/tmp/magrathea-put-object.out
          curl -fsS http://127.0.0.1:8080/ci-jvm-smoke-bucket/object.txt | grep -qx 'ci-jvm-smoke-body'
          docker logs magrathea-jvm-smoke > docker-smoke-jvm.log 2>&1
          ! grep -q 'Using generated security password' docker-smoke-jvm.log

  native-docker-manual:
    name: Native Docker image (manual)
    runs-on: ubuntu-latest
    needs: source-and-cucumber-gates
    if: github.event_name == 'workflow_dispatch' && inputs.run-native-docker == 'true'
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Build and smoke native Docker image
        run: |
          set -o pipefail
          docker build --network=host -f Dockerfile.native -t magrathea-objectstorage:native . | tee docker-build-native.log
          ! grep -q 'Using generated security password' docker-build-native.log
          docker rm -f magrathea-native-smoke >/dev/null 2>&1 || true
          docker run -d --name magrathea-native-smoke --network=host magrathea-objectstorage:native
          trap 'docker logs magrathea-native-smoke > docker-smoke-native.log 2>&1 || true; docker rm -f magrathea-native-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8081/admin/health >/tmp/magrathea-native-admin-health.json; then
              break
            fi
            if ! docker ps --format '{{.Names}}' | grep -qx magrathea-native-smoke; then
              docker logs magrathea-native-smoke >&2 || true
              exit 1
            fi
            if [ "$attempt" = 60 ]; then
              docker logs magrathea-native-smoke >&2 || true
              exit 1
            fi
            sleep 1
          done
          curl -fsS -H 'Accept: application/xml' http://127.0.0.1:8080/ >/tmp/magrathea-native-listbuckets.xml
          docker run --rm --entrypoint sh magrathea-objectstorage:native -c '! command -v java && ! command -v javac'
          docker logs magrathea-native-smoke > docker-smoke-native.log 2>&1
          ! grep -q 'Using generated security password' docker-smoke-native.log
