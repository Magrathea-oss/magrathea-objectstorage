# Bare local default profile for unpackaged development/test runs.
# Packaged JVM/native containers override this with SPRING_PROFILES_ACTIVE=storage-engine
# so single-node deployments use the durable storage-engine backend.
# Switch an unpackaged JAR to storage-engine with:
#   java -jar app.jar --spring.profiles.active=storage-engine
spring.profiles.default=single-node
