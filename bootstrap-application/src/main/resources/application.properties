# Bare local default profile for unpackaged development/test runs.
# Packaged JVM/native containers override this with SPRING_PROFILES_ACTIVE=storage-engine
# so single-node deployments use the durable storage-engine backend.
# Switch an unpackaged JAR to storage-engine with:
#   java -jar app.jar --spring.profiles.active=storage-engine
spring.profiles.default=single-node
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# EP-6 bounded S3 preview envelope (S3 routes only; Admin API is excluded).
s3.capacity.enabled=true
s3.capacity.max-single-put-bytes=268435456
s3.capacity.max-multipart-part-bytes=67108864
s3.capacity.max-assembled-multipart-bytes=268435456
s3.capacity.max-concurrent-requests=16
s3.capacity.max-tcp-connections=64
s3.capacity.request-timeout=300s
s3.capacity.rate-limit-per-second=100
s3.capacity.rate-limit-burst=200
