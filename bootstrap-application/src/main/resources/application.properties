# Bare local default profile for unpackaged development/test runs.
# Packaged JVM/native containers override this with SPRING_PROFILES_ACTIVE=storage-engine
# so single-node deployments use the durable storage-engine backend.
# Switch an unpackaged JAR to storage-engine with:
#   java -jar app.jar --spring.profiles.active=storage-engine
spring.profiles.default=single-node
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# EP-10 fixed-cluster composition. Activate with SPRING_PROFILES_ACTIVE=storage-engine,cluster.
# Each JVM overrides node-id, roots, S3 port, and its local certificate/key paths while
# retaining the identical A/B/C peer declaration.
magrathea.cluster.node-id=${MAGRATHEA_CLUSTER_NODE_ID:A}
magrathea.cluster.topology-epoch=${MAGRATHEA_CLUSTER_TOPOLOGY_EPOCH:topology-1}
magrathea.cluster.policy-epoch=${MAGRATHEA_CLUSTER_POLICY_EPOCH:policy-1}
magrathea.cluster.peers[0].name=A
magrathea.cluster.peers[0].id=${MAGRATHEA_CLUSTER_A_ID:11111111-1111-4111-8111-111111111111}
magrathea.cluster.peers[0].control-address=${MAGRATHEA_CLUSTER_A_CONTROL:127.0.0.1:19801}
magrathea.cluster.peers[0].data-address=${MAGRATHEA_CLUSTER_A_DATA:127.0.0.1:19901}
magrathea.cluster.peers[0].failure-domain=${MAGRATHEA_CLUSTER_A_FAILURE_DOMAIN:rack-a}
magrathea.cluster.peers[1].name=B
magrathea.cluster.peers[1].id=${MAGRATHEA_CLUSTER_B_ID:22222222-2222-4222-8222-222222222222}
magrathea.cluster.peers[1].control-address=${MAGRATHEA_CLUSTER_B_CONTROL:127.0.0.1:19802}
magrathea.cluster.peers[1].data-address=${MAGRATHEA_CLUSTER_B_DATA:127.0.0.1:19902}
magrathea.cluster.peers[1].failure-domain=${MAGRATHEA_CLUSTER_B_FAILURE_DOMAIN:rack-b}
magrathea.cluster.peers[2].name=C
magrathea.cluster.peers[2].id=${MAGRATHEA_CLUSTER_C_ID:33333333-3333-4333-8333-333333333333}
magrathea.cluster.peers[2].control-address=${MAGRATHEA_CLUSTER_C_CONTROL:127.0.0.1:19803}
magrathea.cluster.peers[2].data-address=${MAGRATHEA_CLUSTER_C_DATA:127.0.0.1:19903}
magrathea.cluster.peers[2].failure-domain=${MAGRATHEA_CLUSTER_C_FAILURE_DOMAIN:rack-c}
magrathea.cluster.roots.identity=${MAGRATHEA_CLUSTER_IDENTITY_ROOT:target/cluster/node-a/identity}
magrathea.cluster.roots.ratis=${MAGRATHEA_CLUSTER_RATIS_ROOT:target/cluster/node-a/ratis}
magrathea.cluster.roots.objects=${MAGRATHEA_CLUSTER_OBJECT_ROOT:target/cluster/node-a/objects}
magrathea.cluster.roots.temporary=${MAGRATHEA_CLUSTER_TEMPORARY_ROOT:target/cluster/node-a/temporary}
magrathea.cluster.roots.runtime=${MAGRATHEA_CLUSTER_RUNTIME_ROOT:target/cluster/node-a/runtime}
magrathea.cluster.tls.control.certificate=${MAGRATHEA_CLUSTER_CONTROL_CERTIFICATE:}
magrathea.cluster.tls.control.private-key=${MAGRATHEA_CLUSTER_CONTROL_PRIVATE_KEY:}
magrathea.cluster.tls.control.trust-certificate=${MAGRATHEA_CLUSTER_CONTROL_TRUST_CERTIFICATE:}
magrathea.cluster.tls.data.certificate=${MAGRATHEA_CLUSTER_DATA_CERTIFICATE:}
magrathea.cluster.tls.data.private-key=${MAGRATHEA_CLUSTER_DATA_PRIVATE_KEY:}
magrathea.cluster.tls.data.trust-certificate=${MAGRATHEA_CLUSTER_DATA_TRUST_CERTIFICATE:}
magrathea.cluster.deadlines.transfer=${MAGRATHEA_CLUSTER_TRANSFER_DEADLINE:5s}
magrathea.cluster.deadlines.read=${MAGRATHEA_CLUSTER_READ_DEADLINE:5s}
magrathea.cluster.deadlines.slow-replica-acceptance=${MAGRATHEA_CLUSTER_SLOW_REPLICA_ACCEPTANCE:0s}

# EP-6 bounded S3 preview envelope (S3 routes only; Admin API is excluded).
s3.capacity.enabled=true
s3.capacity.max-single-put-bytes=268435456
s3.capacity.max-multipart-part-bytes=67108864
s3.capacity.max-assembled-multipart-bytes=268435456
s3.capacity.max-concurrent-requests=16
s3.capacity.max-tcp-connections=64
s3.capacity.request-timeout=300s
s3.capacity.rate-limit-per-second=100
s3.capacity.rate-limit-burst=200
