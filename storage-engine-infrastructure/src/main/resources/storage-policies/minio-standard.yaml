policyId: minio-standard
version: "1.0"
storageClassId: STANDARD

# First executable scope: single-node MinIO-compatible behavior.
# Deduplication is enabled with SHA256 fingerprints and 1 MiB chunks.
# No erasure coding, no multi-replica behavior, and no encryption by default.
# Compression is also disabled to match MinIO's default object-storage path.

dedup:
  enabled: true
  scope: BUCKET
  chunkSizeBytes: 1048576
  algorithm: SHA256
  alignment: NONE
  namespace:
    type: BUCKET

compression:
  enabled: false
  algorithm: ZSTD
  level: 0

encryption:
  enabled: false
  mode: NONE

replication:
  factor: 1

erasureCoding:
  enabled: false
