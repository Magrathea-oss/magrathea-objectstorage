policyId: minio-standard
version: "1.0"
storageClassId: STANDARD

# MinIO-compatible STANDARD behavior is modeled as erasure coding, not deduplication.
# This YAML enables policy-level EC with 4 data blocks and 2 parity blocks.
# Replication stays at factor 1: EC provides redundancy without multi-replica behavior.
# Compression and encryption are disabled by default to match the normal object-storage path.
# Current sample device catalogs validate loading and device selection; they do not yet claim
# physical EC shard placement across multiple devices.

dedup:
  enabled: false

compression:
  enabled: false
  algorithm: ZSTD
  level: 0

encryption:
  enabled: false
  mode: NONE

replication:
  factor: 1

erasureCoding:
  enabled: true
  dataBlocks: 4
  parityBlocks: 2
